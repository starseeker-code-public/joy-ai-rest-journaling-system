[project]
name = "joy-ai-manifestation-platform"
version = "0.3.0"
description = "Journaling backend — Flask + MongoDB + RabbitMQ event bus."
requires-python = ">=3.11"

dependencies = [
    "flask",
    "python-dotenv",
    "pymongo",
    "argon2-cffi",
    "pyjwt",
    "pika",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "mongomock",
]
ai = [
    "transformers",
    "torch",
]
