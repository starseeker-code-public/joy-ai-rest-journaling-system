[project]
name = "joy-ai-manifestation-platform"
version = "0.2.0"
description = "Journaling backend — Flask + MongoDB."
requires-python = ">=3.11"

dependencies = [
    "flask",
    "python-dotenv",
    "pymongo",
    "argon2-cffi",
    "pyjwt",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "mongomock",
]
