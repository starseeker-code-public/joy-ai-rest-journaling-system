# Joy API gateway — unified entry point in front of the Flask API.
#
# Route registry:
#   /auth/*   -> api (login additionally rate-limited at the edge)
#   /api/*    -> api (journals, habits, goals, analytics, insights, search)
#   /health   -> api aggregated dependency health
#
# JWT verification stays in the API for now (nginx would need njs/extra
# modules); the gateway contributes edge rate limiting and a single origin.

limit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_status 429;

server {
    listen 80;

    # Re-resolve the api container through Docker's DNS so a recreated
    # container (new IP) doesn't leave the gateway serving 502s.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $joy_api http://api:5000;

    location = /auth/login {
        limit_req zone=login burst=5 nodelay;
        proxy_pass $joy_api;
        include /etc/nginx/proxy_params.conf;
    }

    location /auth/ {
        proxy_pass $joy_api;
        include /etc/nginx/proxy_params.conf;
    }

    location /api/ {
        limit_req zone=api burst=60 nodelay;
        proxy_pass $joy_api;
        include /etc/nginx/proxy_params.conf;
    }

    location = /health {
        proxy_pass $joy_api;
        include /etc/nginx/proxy_params.conf;
    }

    location / {
        return 404 '{"error": "Not found"}';
        default_type application/json;
    }
}
