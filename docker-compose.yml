services:

  api:
    build: .
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: development
      DEBUG: "true"
      MONGO_URL: mongodb://mongo:27017
      MONGO_DB: joy
      RABBITMQ_URL: amqp://joy:joy@rabbitmq:5672/
    depends_on:
      mongo:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - .:/app

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  consumer:
    build: .
    command: python consumer.py
    environment:
      RABBITMQ_URL: amqp://joy:joy@rabbitmq:5672/
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
      - .:/app

  analysis-worker:
    build:
      context: .
      dockerfile: Dockerfile.ai
    environment:
      RABBITMQ_URL: amqp://joy:joy@rabbitmq:5672/
      MONGO_URL: mongodb://mongo:27017
      MONGO_DB: joy
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongo:
        condition: service_healthy
    volumes:
      - .:/app

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      # Published on 5673/15673 to avoid clashing with a host RabbitMQ on 5672
      - "5673:5672"
      - "15673:15672"
    environment:
      RABBITMQ_DEFAULT_USER: joy
      RABBITMQ_DEFAULT_PASS: joy
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo-data:
  rabbitmq-data:
