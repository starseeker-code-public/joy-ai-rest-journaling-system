services:

  api:
    build: .
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: development
      DEBUG: "true"
      MONGO_URL: mongodb://mongo:27017
      MONGO_DB: joy
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - .:/app

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  mongo-data:
