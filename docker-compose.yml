services:

  gateway:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./gateway/proxy_params.conf:/etc/nginx/proxy_params.conf:ro
    depends_on:
      - api
    healthcheck:
      # 127.0.0.1, not localhost: busybox wget resolves localhost to ::1
      # while nginx only listens on IPv4
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6

  api:
    build: .
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: development
      DEBUG: "true"
      MONGO_URL: mongodb://mongo:27017
      MONGO_DB: joy
      RABBITMQ_URL: amqp://joy:joy@rabbitmq:5672/
      OPENSEARCH_URL: http://opensearch:9200
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 8123
      REDIS_URL: redis://redis:6379/0
    depends_on:
      mongo:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  consumer:
    build: .
    command: python consumer.py
    environment:
      RABBITMQ_URL: amqp://joy:joy@rabbitmq:5672/
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
      - .:/app

  analysis-worker:
    build:
      context: .
      dockerfile: Dockerfile.ai
    environment:
      RABBITMQ_URL: amqp://joy:joy@rabbitmq:5672/
      MONGO_URL: mongodb://mongo:27017
      MONGO_DB: joy
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongo:
        condition: service_healthy
    volumes:
      - .:/app

  search-indexer:
    build: .
    command: python search_indexer.py
    environment:
      RABBITMQ_URL: amqp://joy:joy@rabbitmq:5672/
      OPENSEARCH_URL: http://opensearch:9200
      # Needed for the startup backfill of pre-existing entries
      MONGO_URL: mongodb://mongo:27017
      MONGO_DB: joy
    depends_on:
      rabbitmq:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      mongo:
        condition: service_healthy
    volumes:
      - .:/app

  redis:
    image: redis:7
    ports:
      # Published on 6380 to avoid clashing with a host Redis on 6379
      - "6380:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  analytics-sink:
    build: .
    command: python analytics_sink.py
    environment:
      RABBITMQ_URL: amqp://joy:joy@rabbitmq:5672/
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 8123
    depends_on:
      rabbitmq:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    volumes:
      - .:/app

  insight-worker:
    build: .
    command: python insight_worker.py
    environment:
      RABBITMQ_URL: amqp://joy:joy@rabbitmq:5672/
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 8123
      MONGO_URL: mongodb://mongo:27017
      MONGO_DB: joy
    depends_on:
      rabbitmq:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      mongo:
        condition: service_healthy
    volumes:
      - .:/app

  clickhouse:
    image: clickhouse/clickhouse-server:24
    ports:
      - "8123:8123"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8123/ping || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12

  opensearch:
    image: opensearchproject/opensearch:2
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      # Published on 5673/15673 to avoid clashing with a host RabbitMQ on 5672
      - "5673:5672"
      - "15673:15672"
    environment:
      RABBITMQ_DEFAULT_USER: joy
      RABBITMQ_DEFAULT_PASS: joy
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo-data:
  rabbitmq-data:
  opensearch-data:
  clickhouse-data:
  redis-data:
