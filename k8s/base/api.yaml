apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  labels: {app: api}
spec:
  replicas: 2
  selector:
    matchLabels: {app: api}
  template:
    metadata:
      labels: {app: api}
    spec:
      containers:
      - name: api
        image: joy-app:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5000

        envFrom:
        - configMapRef:
            name: joy-config
        - secretRef:
            name: joy-secrets
        readinessProbe:
          httpGet: {path: /health, port: 5000}
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet: {path: /health, port: 5000}
          initialDelaySeconds: 15
          periodSeconds: 20
        resources:
          requests: {cpu: 100m, memory: 256Mi}
          limits: {cpu: "1", memory: 512Mi}
---
apiVersion: v1
kind: Service
metadata:
  name: api
spec:
  selector: {app: api}
  ports:
  - port: 5000
    targetPort: 5000
