apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  labels: {app: minio}
spec:
  replicas: 1
  selector:
    matchLabels: {app: minio}
  strategy: {type: Recreate}
  template:
    metadata:
      labels: {app: minio}
    spec:
      containers:
      - name: minio
        image: minio/minio:latest
        ports:
        - containerPort: 9000
        args: ["server", "/data"]
        env:
        - {name: MINIO_ROOT_USER, value: joy}
        - {name: MINIO_ROOT_PASSWORD, value: joysecret}
        volumeMounts:
        - name: data
          mountPath: /data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: minio-data
---
apiVersion: v1
kind: Service
metadata:
  name: minio
spec:
  selector: {app: minio}
  ports:
  - port: 9000
    targetPort: 9000
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-data
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests: {storage: 1Gi}
