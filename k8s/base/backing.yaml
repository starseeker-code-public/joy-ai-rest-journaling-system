apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  labels: {app: rabbitmq}
spec:
  replicas: 1
  selector:
    matchLabels: {app: rabbitmq}
  strategy: {type: Recreate}
  template:
    metadata:
      labels: {app: rabbitmq}
    spec:
      containers:
      - name: rabbitmq
        image: rabbitmq:3-management
        ports:
        - containerPort: 5672
        env:
        - {name: RABBITMQ_DEFAULT_USER, value: joy}
        - {name: RABBITMQ_DEFAULT_PASS, value: joy}
        volumeMounts:
        - name: data
          mountPath: /var/lib/rabbitmq
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: rabbitmq-data
---
