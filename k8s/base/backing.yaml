apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo
  labels: {app: mongo}
spec:
  replicas: 1
  selector:
    matchLabels: {app: mongo}
  strategy: {type: Recreate}
  template:
    metadata:
      labels: {app: mongo}
    spec:
      containers:
      - name: mongo
        image: mongo:7
        ports:
        - containerPort: 27017
        volumeMounts:
        - name: data
          mountPath: /data/db
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: mongo-data
---
apiVersion: v1
kind: Service
metadata:
  name: mongo
spec:
  selector: {app: mongo}
  ports:
  - port: 27017
    targetPort: 27017
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongo-data
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests: {storage: 1Gi}
---
