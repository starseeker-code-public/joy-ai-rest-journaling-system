apiVersion: apps/v1
kind: Deployment
metadata:
  name: consumer
  labels: {app: consumer}
spec:
  replicas: 1
  selector:
    matchLabels: {app: consumer}
  template:
    metadata:
      labels: {app: consumer}
    spec:
      containers:
      - name: consumer
        image: joy-app:latest
        imagePullPolicy: IfNotPresent
        command: ["python", "consumer.py"]

        envFrom:
        - configMapRef:
            name: joy-config
        - secretRef:
            name: joy-secrets
        resources:
          requests: {cpu: 50m, memory: 128Mi}
          limits: {cpu: "1", memory: 512Mi}
---
