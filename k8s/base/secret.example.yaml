# Copy to secret.yaml (gitignored pattern) with real values before applying,
# or create it directly:
#   kubectl -n joy create secret generic joy-secrets \
#     --from-literal=SECRET_KEY=$(openssl rand -hex 32) ...
apiVersion: v1
kind: Secret
metadata:
  name: joy-secrets
type: Opaque
stringData:
  # Uses the guarded dev default on purpose: with DEBUG=false the API
  # refuses to boot until you replace it, so the placeholder can never
  # silently reach production.
  SECRET_KEY: "dev-secret-key-change-me-in-production-12345"
  RABBITMQ_URL: "amqp://joy:joy@rabbitmq:5672/"
  STORAGE_ACCESS_KEY: "joy"
  STORAGE_SECRET_KEY: "joysecret"
